global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "synaptech-backend"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]
        labels:
          service: "idre-backend"

  - job_name: "synaptech-minio"
    scrape_interval: 30s
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ["minio:9000"]
        labels:
          service: "idre-minio"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
