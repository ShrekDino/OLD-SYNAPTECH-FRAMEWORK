[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "synaptech-idre"
version = "1.0.0"
description = "Integrated Data Representation Engine for FlyWire 130k-neuron connectome"
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [
    {name = "SynapTech"},
]

dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.0.0",
    "pydantic-settings>=2.0.0",
    "cupy-cuda12x>=13.0.0",
    "httpx>=0.27.0",
    "cryptography>=43.0.0",
    "pinecone-client>=5.0.0",
    "numpy>=1.26.0",
    "pandas>=2.2.0",
    "prometheus-client>=0.21.0",
]

[project.optional-dependencies]
neuromorphic = ["lava-nc>=0.10.0"]
s3 = ["boto3>=1.35.0", "minio>=7.2.0"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.24", "mypy>=1.10", "ruff>=0.6"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W"]

[tool.mypy]
python_version = "3.11"
strict = false
ignore_missing_imports = true
