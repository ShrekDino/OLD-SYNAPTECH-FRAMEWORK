version: "3.9"

services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/lambda-labs/Dockerfile.backend
    image: synaptech/idre-backend:latest
    container_name: idre-backend
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_VISIBLE_DEVICES=0
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX=synaptech-telemetry
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - LAVA_BACKEND=${LAVA_BACKEND:-sim}
      - INRC_ENABLED=${INRC_ENABLED:-false}
      - JWT_SECRET=${JWT_SECRET:-""}
      - API_KEYS=${API_KEYS:-""}
      - S3_ENDPOINT=${S3_ENDPOINT:-http://minio:9000}
      - S3_BUCKET=synaptech-ip-encrypted
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-minioadmin}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-minioadmin}
      - DATA_PATH=/data/flywire
      - LAYOUT_PATH=/data/layout.json
      - LOG_LEVEL=INFO
    ports:
      - "8000:8000"
    volumes:
      - flywire-data:/data/flywire
      - layout-data:/data/layout
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"

  frontend:
    build:
      context: ../..
      dockerfile: deploy/lambda-labs/Dockerfile.frontend
    image: synaptech/idre-frontend:latest
    container_name: idre-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: idre-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: idre-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped

volumes:
  flywire-data:
    driver: local
  layout-data:
    driver: local
  minio-data:
    driver: local
  prometheus-data:
    driver: local
