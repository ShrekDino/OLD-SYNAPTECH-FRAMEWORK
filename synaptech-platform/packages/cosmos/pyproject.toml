[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.backends._legacy:_Backend"

[project]
name = "synaptech-cosmos"
version = "0.1.0"
description = "NVIDIA Cosmos integration layer for the SynapTechBio ecosystem"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "torch>=2.0",
    "aiohttp>=3.9",
]

[project.optional-dependencies]
predict = [
    "cosmos-predict2>=0.1",
]
reason = [
    "transformers>=4.57.0",
]
tokenizer = [
    "torch>=2.0",
]
nim = [
    "docker>=7.0",
]
cloud = [
    "aiohttp>=3.9",
]
all = [
    "cosmos-predict2>=0.1",
    "transformers>=4.57.0",
    "docker>=7.0",
]

[tool.setuptools.packages.find]
where = ["src"]
