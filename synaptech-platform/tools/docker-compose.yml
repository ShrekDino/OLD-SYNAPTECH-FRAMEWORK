services:
  idre-backend:
    build:
      context: ../packages/idre
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - idre-data:/data
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  idre-frontend:
    build:
      context: ../packages/idre/src/frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      - idre-backend

  flywire-lsm:
    build:
      context: ../packages/flywire-lsm
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 0

  flywire-realtime:
    build:
      context: ../packages/flywire-realtime
      dockerfile: Dockerfile
    ports:
      - "5555:5555/udp"
      - "5556:5556/udp"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  cosmos-nim:
    image: nvidia/cosmos-predict2.5
    ports:
      - "8002:8000"
    environment:
      - NGC_API_KEY=${NGC_API_KEY}
      - NVIDIA_VISIBLE_DEVICES=all
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - cosmos-nim

volumes:
  idre-data:
