id: io.github.freegen
runtime: org.kde.Platform
runtime-version: "6.7"
sdk: org.kde.Sdk
command: freegen

finish-args:
  - --socket=x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  - --socket=pulseaudio
  - --filesystem=host
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.ScreenCast
  - --own-name=org.freedesktop.impl.portal.*
  - --env=PIPEWIRE_RUNTIME_DIR=/run/user/$UID/pipewire-0

modules:
  - name: freegen
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DFREEGEN_ENABLE_TESTS=OFF
      - -DFREEGEN_BUILD_SHADERS=ON
    builddir: true
    sources:
      - type: dir
        path: ..
    build-commands:
      - cmake .. -DCMAKE_INSTALL_PREFIX=/app ${config_opts[@]}
      - cmake --build . -j$(nproc)
      - cmake --install .

  - name: vulkan-loader
    buildsystem: simple
    build-commands:
      - install -Dm644 /usr/lib/x86_64-linux-gnu/libvulkan.so* -t /app/lib/
    sources:
      - type: file
        path: /dev/null

modules:
  - shared-modules/linux-vulkan/linux-vulkan.json
  - name: glslang
    buildsystem: cmake-ninja
    sources:
      - type: git
        url: https://github.com/KhronosGroup/glslang.git
        tag: main
